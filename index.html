<!DOCTYPE html>
<html>
  <head>
    <title>EduPlay</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-container playlist-hidden">
      <div class="player-section">
        <div id="player-container">
          <video id="media-player"></video>
          <!-- New: Transcript overlay -->
          <div id="transcript-overlay" class="hidden">
            <h3>Transcript</h3>
            <div id="transcript-text"></div>
            <p id="transcript-error" class="hidden"></p>
          </div>
          <!-- New: Loading overlay with progress bar -->
          <div id="loading-overlay" class="hidden">
            <div class="spinner"></div>
            <p>Generating captions...</p>
            <div class="progress-bar-container">
              <div class="progress-bar" id="progress-bar"></div>
            </div>
          </div>
          <div id="controls-overlay">
            <div class="time-control-row">
              <input
                type="range"
                id="time-slider"
                min="0"
                max="100"
                value="0"
              />
              <span id="time-display">00:00 / 00:00</span>
            </div>
            <div class="controls-container">
              <div class="playback-controls">
                <button class="control-button" id="previous" title="Previous">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polygon points="19 20 9 12 19 4 19 20"></polygon>
                    <line x1="5" y1="19" x2="5" y2="5"></line>
                  </svg>
                </button>
                <button
                  class="control-button"
                  id="play-pause"
                  title="Play/Pause"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polygon points="5 3 19 12 5 21 5 3"></polygon>
                  </svg>
                </button>
                <button class="control-button" id="next" title="Next">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polygon points="5 4 15 12 5 20 5 4"></polygon>
                    <line x1="19" y1="5" x2="19" y2="19"></line>
                  </svg>
                </button>

                <div class="volume-control">
                  <button class="control-button" id="mute" title="Mute">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="24"
                      height="24"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <polygon
                        points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"
                      ></polygon>
                      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
                    </svg>
                  </button>
                  <input
                    type="range"
                    id="volume-slider"
                    min="0"
                    max="100"
                    value="100"
                  />
                </div>
              </div>

              <div class="advanced-options">
                <button class="control-button" id="shuffle" title="Shuffle">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <polyline points="16 3 21 3 21 8"></polyline>
                    <line x1="4" y1="20" x2="21" y2="3"></line>
                    <polyline points="21 16 21 21 16 21"></polyline>
                    <line x1="15" y1="15" x2="21" y2="21"></line>
                    <line x1="4" y1="4" x2="9" y2="9"></line>
                  </svg>
                </button>
                <button class="control-button" id="loop" title="Loop">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M17 2.1l4 4-4 4"></path>
                    <path
                      d="M3 12.2v-2a4 4 0 0 1 4-4h12.8M7 21.9l-4-4 4-4"
                    ></path>
                    <path d="M21 11.8v2a4 4 0 0 1-4 4H4.2"></path>
                  </svg>
                </button>
                <div id="playback-speed-container">
                  <button class="speed-button" id="speed-toggle">1.0x</button>
                  <div class="speed-options">
                    <button class="speed-option" data-speed="0.25">
                      0.25x
                    </button>
                    <button class="speed-option" data-speed="0.5">0.5x</button>
                    <button class="speed-option" data-speed="0.75">
                      0.75x
                    </button>
                    <button class="speed-option active" data-speed="1.0">
                      1.0x
                    </button>
                    <button class="speed-option" data-speed="1.25">
                      1.25x
                    </button>
                    <button class="speed-option" data-speed="1.5">1.5x</button>
                    <button class="speed-option" data-speed="1.75">
                      1.75x
                    </button>
                    <button class="speed-option" data-speed="2.0">2.0x</button>
                  </div>
                </div>
                <div class="group search-bar">
                  <!-- Search Icon -->
                  <svg
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                    class="search-icon"
                  >
                    <g>
                      <path
                        d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"
                      ></path>
                    </g>
                  </svg>

                  <!-- Input -->
                  <input
                    id="query"
                    class="input"
                    type="search"
                    placeholder="Search..."
                    name="searchbar"
                  />
                  <span id="search-counter" class="search-counter"></span>
                  <!-- Left Arrow -->
                  <svg
                    class="arrow"
                    id="arrow-left"
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                    class="arrow-icon"
                    style="display: block"
                  >
                    <path
                      d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"
                    ></path>
                  </svg>

                  <!-- Right Arrow -->
                  <svg
                    class="arrow"
                    id="arrow-right"
                    viewBox="0 0 24 24"
                    aria-hidden="true"
                    class="arrow-icon"
                    style="display: block"
                  >
                    <path
                      d="M8.59 16.59 10 18l6-6-6-6-1.41 1.41L13.17 12z"
                    ></path>
                  </svg>
                </div>

                <button
                  class="control-button"
                  id="fullscreen"
                  title="Fullscreen"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
                    <path d="M21 8V5a2 2 0 0 0-2-2h-3"></path>
                    <path d="M3 16v3a2 2 0 0 0 2 2h3"></path>
                    <path d="M16 21h3a2 2 0 0 0 2-2v-3"></path>
                  </svg>
                </button>
                <button
                  class="control-button"
                  id="toggle-playlist"
                  title="Toggle Playlist"
                >
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    class="lucide lucide-list-music"
                  >
                    <path d="M21 15V6" />
                    <path d="M18.5 18a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z" />
                    <path d="M12 12H3" />
                    <path d="M16 6H3" />
                    <path d="M12 18H3" />
                  </svg>
                </button>
                <!-- Ask-AI Button (Thin Line Version) -->
                <button
                  class="control-button"
                  id="ask-ai"
                  title="Ask AI about video"
                >
                  <svg
                    viewBox="0 0 15 15"
                    xmlns="http://www.w3.org/2000/svg"
                    width="24"
                    height="24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.25"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path
                      d="M8.99996 2.49988L8.99996 1.99988L8.99996 2.49988ZM5.99995 2.4999L5.99995 2.9999L5.99995 2.4999ZM12.8556 11.9222L12.5051 11.5656L12.3012 11.7661L12.3705 12.0434L12.8556 11.9222ZM13.5 14.4999L13.3788 14.985C13.5492 15.0276 13.7294 14.9776 13.8536 14.8534C13.9778 14.7293 14.0277 14.549 13.9851 14.3786L13.5 14.4999ZM9.50005 13.5L9.14649 13.1464L8.52204 13.7709L9.37879 13.985L9.50005 13.5ZM9.52482 13.4752L9.87838 13.8287C10.0275 13.6796 10.067 13.453 9.97722 13.2623C9.88743 13.0715 9.68761 12.9575 9.4777 12.9774L9.52482 13.4752ZM0.5 7.99988L0 7.99988L0.5 7.99988ZM7 0V2.5H8V0H7ZM8.99996 1.99988L5.99994 1.9999L5.99995 2.9999L8.99997 2.99988L8.99996 1.99988ZM15 7.99988C15 4.68615 12.3137 1.99985 8.99996 1.99988L8.99997 2.99988C11.7614 2.99985 14 5.23844 14 7.99988H15ZM13.2061 12.2787C14.3128 11.1908 15 9.67513 15 7.99988H14C14 9.39612 13.4284 10.6579 12.5051 11.5656L13.2061 12.2787ZM13.9851 14.3786L13.3407 11.8009L12.3705 12.0434L13.015 14.6212L13.9851 14.3786ZM9.37879 13.985L13.3788 14.985L13.6213 14.0148L9.62131 13.0149L9.37879 13.985ZM9.17127 13.1216L9.14649 13.1464L9.8536 13.8535L9.87838 13.8287L9.17127 13.1216ZM9.00001 13.9999C9.19278 13.9999 9.38357 13.9908 9.57194 13.973L9.4777 12.9774C9.32061 12.9923 9.16127 12.9999 9.00001 12.9999V13.9999ZM5.99999 13.9999H9.00001V12.9999H5.99999V13.9999ZM0 7.99988C-9.17912e-06 11.3136 2.68628 13.9999 5.99999 13.9999V12.9999C3.23857 12.9999 0.999992 10.7613 1 7.99988L0 7.99988ZM5.99994 1.9999C2.68626 1.99993 9.17912e-06 4.6862 0 7.99988L1 7.99988C1.00001 5.23849 3.23855 2.99993 5.99995 2.9999L5.99994 1.9999ZM7.5 8C6.67157 8 6 7.32843 6 6.5H5C5 7.88071 6.11929 9 7.5 9V8ZM9 6.5C9 7.32843 8.32843 8 7.5 8V9C8.88071 9 10 7.88071 10 6.5H9ZM7.5 5C8.32843 5 9 5.67157 9 6.5H10C10 5.11929 8.88071 4 7.5 4V5ZM7.5 4C6.11929 4 5 5.11929 5 6.5H6C6 5.67157 6.67157 5 7.5 5V4ZM7.49999 12C8.56368 12 9.54241 11.6303 10.3127 11.0128L9.68724 10.2326C9.08795 10.713 8.32817 11 7.49999 11V12ZM4.68727 11.0128C5.45757 11.6303 6.43629 12 7.49999 12V11C6.6718 11 5.91202 10.713 5.31273 10.2326L4.68727 11.0128Z"
                    />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="playlist-panel" class="hidden">
        <div class="playlist-header">
          <h3>Playlist</h3>
          <button
            class="control-button"
            id="clear-playlist"
            title="Clear Playlist"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M3 6h18"></path>
              <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
              <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
            </svg>
          </button>
        </div>

        <div class="playlist-container">
          <div class="playlist-empty">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 18V5l12-2v13" />
              <circle cx="6" cy="18" r="3" />
              <circle cx="18" cy="16" r="3" />
            </svg>
            <p>Drop media files here<br />to start playing</p>
          </div>

          <div id="playlist"></div>
        </div>
      </div>

      <template id="resume-dialog-template">
        <div class="resume-dialog">
          <div class="resume-content">
            <p class="resume-position-text">
              Resume from <span class="resume-time"></span>?
            </p>
            <p class="countdown"></p>
            <div class="resume-buttons">
              <button class="resume-yes">Yes</button>
              <button class="resume-no">No</button>
            </div>
          </div>
        </div>
      </template>
    </div>
    <div id="container-loader">
      <div id="loader"></div>
      <div>Generating captions...</div>
    </div>
    <!-- Ask-AI Chat Popup -->
    <div id="ai-chat-popup" class="hidden">
      <div class="ai-chat-header">
        <span>Ask AI about this video</span>
        <button id="close-ai-chat" title="Close">✕</button>
      </div>
      <div class="ai-chat-body" id="ai-chat-body">
        <div class="ai-message ai-bot">
          Hi! I’m your video assistant 🤖. Ask me anything about this video.
        </div>
      </div>
      <div class="ai-chat-input">
        <input
          type="text"
          id="ai-input"
          placeholder="Ask something about this video..."
        />
        <button id="send-ai">Send</button>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
